[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude directories
norecursedirs = .git .pytest_cache __pycache__ helpers fixtures .hypothesis

# Output format
console_output_style = progress
addopts = -v --tb=short --strict-markers -ra

# Test markers
markers =
    smoke: Quick tests (< 5 seconds)
    crud: CRUD operation tests
    acl: Access control tests
    cdr: CDR filtering tests
    slow: Slow tests (> 10 seconds)
    cleanup: Cleanup tests that should run last

# Timeout for individual tests (seconds)
timeout = 60

# Order plugin settings
# Tests run in file name order (test_01, test_02, etc.)

# Suppress warnings
filterwarnings =
    ignore::urllib3.exceptions.InsecureRequestWarning
    ignore:Unverified HTTPS request
    ignore:Skipping collection of '.hypothesis' directory
